name: Tests

on:
  pull_request:
  push:

permissions:
  contents: read

jobs:
  test:
    name: Node.js tests
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install --package-lock=false
          fi

      - name: Run tests
        run: npm test
